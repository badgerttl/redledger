# To remove images when stopping: docker compose down --rmi all
# (--rmi local removes only images without a custom tag)
services:
  redledger:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/app/data:Z
    environment:
      - DATA_DIR=/app/data
    restart: unless-stopped
